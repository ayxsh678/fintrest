services:
  - type: web
    name: fintrest-python
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: OPEN_EXCHANGE_RATES_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: fintrest-go
    runtime: go
    rootDir: backend
    buildCommand: go build -o main .
    startCommand: ./main
    envVars:
      - key: PYTHON_SERVICE_URL
        value: https://finance-ai-bt9x.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PORT
        value: "8000"
